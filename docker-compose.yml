services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --appendfsync everysec --maxmemory 512mb --maxmemory-policy allkeys-lru

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: arise-db
      POSTGRES_USER: system
      POSTGRES_PASSWORD: system
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U system -d arise-db"]
      interval: 2s
      retries: 10
    volumes:
      - pg_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  healer:
    build:
      dockerfile: Dockerfile.healer
    environment:
      PGHOST: postgres
      PGUSER: system
      PGPASSWORD: system
      PGDATABASE: arise-db
      MONGO_URI: mongodb://mongo:27017
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  redis_data:
  pg_data:
  mongo_data:
